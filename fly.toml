# Fly.io deployment config
# After installing flyctl:
#   fly launch --no-deploy --copy-config
#   fly secrets set ANTHROPIC_API_KEY=... OPENAI_API_KEY=... TWILIO_ACCOUNT_SID=... TWILIO_AUTH_TOKEN=...
#   fly deploy

app = "luma-prototype"
primary_region = "fra"        # Frankfurt — closer latency to Africa than US

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  CLAUDE_MODEL = "claude-sonnet-4-6"
  TWILIO_WHATSAPP_FROM = "whatsapp:+14155238886"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"     # cheap; cold-starts are fast for our use
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[mounts]]
  source = "luma_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
