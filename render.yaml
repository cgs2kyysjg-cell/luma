# Render deployment config
# Push this repo to GitHub, then in Render: "New +" → "Blueprint" → point to your repo.
# Render will read this file and provision the service.

services:
  - type: web
    name: luma-prototype
    runtime: node
    region: frankfurt          # closer to Africa than US-East
    plan: starter              # free tier; upgrade if you outgrow it
    branch: main
    buildCommand: npm install && npm run ingest
    startCommand: npm run start:prod
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false            # set this in the Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: PUBLIC_BASE_URL
        sync: false            # set to https://<service-name>.onrender.com after first deploy
    disk:
      name: luma-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
